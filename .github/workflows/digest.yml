name: Update AI/Notion Digest

on:
  schedule:
    - cron: "0 23 * * *" # 08:00 JST
    - cron: "0 9 * * *"  # 18:00 JST
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - run: npm run collect

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state docs
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update digest $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
          fi
